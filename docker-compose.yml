version: "3.8"

services:
  app:
    build: ./Project/base-project/backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=myuser
      - DB_PASSWORD=mypass
      - DB_NAME=mydatabase
    depends_on:
      - db

  db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypass
      - POSTGRES_DB=mydatabase
    ports:
      - "5432:5432"
